version: '3.8'
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Pa55w.rd 
      MYSQL_DATABASE: online_store
      MYSQL_USER: appuser 
      MYSQL_PASSWORD: Pa55w.rd 
    volumes:
      - db_data:/var/lib/mysql
      # - ./Backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 60
    networks:
      - database_network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile   
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: mysql
      USER: appuser
      PASSWORD: Pa55w.rd
      NAME: online_store
      POOL_SIZE: 5
      ADMIN_USER: admin
      ADMIN_PASSWORD: 5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8
    stdin_open: true
    tty: true
    networks:
      - database_network

volumes:
  db_data:

networks:
  database_network: 
    driver: bridge